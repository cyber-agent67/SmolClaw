name: Cross-platform install

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-check:
    name: Install check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install editable package
        run: |
          uv venv
          uv pip install -e .

      - name: Smoke import
        run: uv run python -c "import smolclaw; print('smolclaw import ok')"
